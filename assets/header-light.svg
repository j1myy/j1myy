<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="Jimwel Mañibo — information technology student, building for iOS">
  <style>
    .ff { font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif; }
  </style>

  <!-- Name -->
  <g opacity="0" transform="translate(0,12)">
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.05s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.05s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <text class="ff" x="640" y="176" text-anchor="middle" font-size="64" font-weight="600" letter-spacing="-1.4" fill="#1D1D1F">Jimwel Mañibo</text>
  </g>

  <!-- Subtitle -->
  <g opacity="0" transform="translate(0,12)">
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.17s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.17s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <text class="ff" x="640" y="224" text-anchor="middle" font-size="20" font-weight="400" letter-spacing="0.1" fill="#6E6E73">Information technology student. Building for iOS — and the systems behind it.</text>
  </g>

  <!-- Tagline -->
  <g opacity="0" transform="translate(0,12)">
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.29s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.29s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <text class="ff" x="640" y="290" text-anchor="middle" font-size="17" font-weight="400" letter-spacing="0.1" fill="#86868B">Building a life I don&#8217;t need to escape from.</text>
  </g>

  <!-- Hairline -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.41s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <line x1="460" y1="338" x2="820" y2="338" stroke="#D2D2D7" stroke-width="1"/>
  </g>

  <!-- Eyebrow -->
  <g opacity="0" transform="translate(0,12)">
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.50s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.50s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <text class="ff" x="640" y="382" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2.2" fill="#86868B">TOOLS</text>
  </g>

  <!-- Stack -->
  <g opacity="0" transform="translate(0,12)">
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.58s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.58s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
    <text class="ff" x="640" y="412" text-anchor="middle" font-size="16" font-weight="500" letter-spacing="0.3" fill="#1D1D1F">Swift&#160;&#160;·&#160;&#160;Kotlin&#160;&#160;·&#160;&#160;Python&#160;&#160;·&#160;&#160;TypeScript&#160;&#160;·&#160;&#160;JavaScript</text>
  </g>
</svg>
