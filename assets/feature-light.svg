<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 300" width="1280" height="300" role="img" aria-label="What I build — native iOS, cross-platform, and the backend">
  <defs>
    <style>.ff{font-family:-apple-system,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;}</style>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4F4F6"/>
      <stop offset="0.55" stop-color="#E9E9ED"/>
      <stop offset="1" stop-color="#F1F1F4"/>
    </linearGradient>
    <radialGradient id="softC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D7E3F4" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#D7E3F4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="softW" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="frost" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#5A5A66" flood-opacity="0.26"/>
    </filter>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="panelClip"><rect x="64" y="30" width="1152" height="240" rx="36"/></clipPath>
    <g id="wallpaper">
      <rect width="1280" height="300" fill="url(#wall)"/>
      <ellipse cx="240" cy="60" rx="340" ry="200" fill="url(#softW)"/>
      <ellipse cx="1040" cy="280" rx="420" ry="240" fill="url(#softC)"/>
    </g>
  </defs>

  <use xlink:href="#wallpaper"/>
  <rect x="64" y="30" width="1152" height="240" rx="36" fill="#FFFFFF" filter="url(#shadow)"/>
  <use xlink:href="#wallpaper" filter="url(#frost)" clip-path="url(#panelClip)"/>
  <rect x="64" y="30" width="1152" height="240" rx="36" fill="#FFFFFF" fill-opacity="0.50"/>
  <g clip-path="url(#panelClip)">
    <rect x="-360" y="30" width="300" height="240" fill="url(#sweep)" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;1640 0;1640 0" keyTimes="0;0.6;1" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1"/>
    </rect>
  </g>
  <line x1="490" y1="118" x2="490" y2="196" stroke="#1D1D1F" stroke-opacity="0.08"/>
  <line x1="790" y1="118" x2="790" y2="196" stroke="#1D1D1F" stroke-opacity="0.08"/>
  <rect x="64" y="30" width="1152" height="240" rx="36" fill="none" stroke="url(#rim)" stroke-width="1.4"/>

  <g class="ff" text-anchor="middle">
    <g opacity="0" transform="translate(0,12)">
      <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.08s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
      <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.08s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
      <text x="640" y="84" font-size="13" font-weight="600" letter-spacing="3" fill="#8A8A8E">WHAT I BUILD</text>
    </g>
    <g opacity="0" transform="translate(0,12)">
      <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.18s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
      <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.18s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
      <text x="320" y="162" font-size="23" font-weight="600" fill="#1D1D1F">Native iOS</text>
      <text x="320" y="194" font-size="15" font-weight="400" fill="#6E6E73">Fluid apps in Swift.</text>
    </g>
    <g opacity="0" transform="translate(0,12)">
      <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.26s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
      <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.26s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
      <text x="640" y="162" font-size="23" font-weight="600" fill="#1D1D1F">Cross-platform</text>
      <text x="640" y="194" font-size="15" font-weight="400" fill="#6E6E73">Kotlin &amp; TypeScript.</text>
    </g>
    <g opacity="0" transform="translate(0,12)">
      <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.34s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
      <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.34s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.7 0.2 1"/>
      <text x="960" y="162" font-size="23" font-weight="600" fill="#1D1D1F">The backend</text>
      <text x="960" y="194" font-size="15" font-weight="400" fill="#6E6E73">Python behind it.</text>
    </g>
  </g>
</svg>
